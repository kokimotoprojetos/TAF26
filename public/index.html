<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPOTFY - Ouvir Músicas Online</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">
        <svg width="32" height="32" viewBox="0 0 32 32">
          <circle cx="16" cy="16" r="14" fill="#1DB954" stroke="#1aa34a" stroke-width="2"/>
          <path d="M13 10v12l10-6z" fill="#fff"/>
        </svg>
        <span>SPOTFY</span>
      </a>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Pesquisar músicas, artistas..." autocomplete="off">
        <button id="searchBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <div id="homeContent">
        <div class="hero">
          <h1>Encontre e ouça suas músicas favoritas</h1>
          <p class="hero-sub">Pesquise no acervo do Kboing e OuvirMúsica — sem anúncios, direto ao som.</p>
          <div class="source-badges">
            <span class="badge badge-kboing">Kboing</span>
            <span class="badge badge-ouvir">OuvirMúsica</span>
          </div>
        </div>

        <div class="ad-blocker-banner">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1DB954" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <path d="m9 12 2 2 4-4"/>
          </svg>
          <span>Bloqueador de anúncios integrado e ativo — navegação 100% limpa</span>
        </div>

        <div class="quick-links">
          <h2>Ouça por gênero</h2>
          <div class="genre-grid" id="genreGrid"></div>
        </div>
      </div>

      <div id="resultsContent" style="display:none;">
        <div class="results-header">
          <button class="back-btn" id="backBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="m15 18-6-6 6-6"/>
            </svg>
            Voltar
          </button>
          <h2 id="resultsTitle">Resultados</h2>
          <span class="results-count" id="resultsCount"></span>
        </div>
        <div class="results-grid" id="resultsGrid"></div>
        <div class="loading" id="loadingSpinner" style="display:none;">
          <div class="spinner"></div>
        </div>
        <div class="no-results" id="noResults" style="display:none;">
          <p>Nenhuma música encontrada. Tente outro termo.</p>
        </div>
      </div>
    </div>
  </main>

  <div class="player-bar" id="playerBar" style="display:none;">
    <div class="player-inner">
      <div class="player-info">
        <img id="playerImg" src="" alt="" class="player-thumb">
        <div class="player-text">
          <span class="player-title" id="playerTitle"></span>
          <span class="player-artist" id="playerArtist"></span>
        </div>
      </div>
      <div class="player-controls">
        <button class="player-btn" id="prevBtn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="player-btn player-btn-play" id="playBtn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" id="pauseIcon" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="player-btn" id="nextBtn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="m6 18 8.5-6L6 6v12zm10-12v12h2V6h-2z"/></svg>
        </button>
      </div>
      <div class="player-source">
        <span class="source-tag" id="playerSource"></span>
      </div>
    </div>
    <div id="youtubePlayer" style="display:none;"></div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="/js/app.js"></script>
</body>
</html>
